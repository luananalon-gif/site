<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Esportes Agora — Notícias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <h1>Esportes Agora</h1>
        <p class="tag">As principais notícias do mundo esportivo</p>
      </div>
      <nav class="main-nav" aria-label="Navegação principal">
        <button id="openAdd" class="btn small">+ Nova notícia</button>
      </nav>
    </div>
  </header>

  <main class="wrap main">
    <section class="hero">
      <h2>Fique por dentro das últimas novidades</h2>
      <p>Notícias, resultados, análises e melhores momentos das suas modalidades favoritas.</p>
      <div class="controls">
        <input id="search" type="search" placeholder="Pesquisar notícias..." aria-label="Pesquisar notícias">
        <select id="filterSport" aria-label="Filtrar por esporte">
          <option value="all">Todas as modalidades</option>
          <option value="Futebol">Futebol</option>
          <option value="Basquete">Basquete</option>
          <option value="Tênis">Tênis</option>
          <option value="Vôlei">Vôlei</option>
          <option value="Fórmula 1">Fórmula 1</option>
        </select>
      </div>
    </section>

    <section class="news">
      <h3>Últimas notícias</h3>
      <div id="newsList" class="grid"></div>
    </section>
  </main>

  <!-- Modal de notícia -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button id="modalClose" class="modal-close" aria-label="Fechar">✕</button>
      <article id="modalArticle"></article>
    </div>
  </div>

  <!-- Formulário adicionar notícia (modal) -->
  <div id="addModal" class="modal" aria-hidden="true">
    <div class="modal-panel">
      <button id="addClose" class="modal-close" aria-label="Fechar">✕</button>
      <form id="addForm" class="add-form">
        <h3>Nova notícia</h3>
        <label>
          Título
          <input name="title" required />
        </label>
        <label>
          Modalidade
          <select name="sport" required>
            <option>Futebol</option>
            <option>Basquete</option>
            <option>Tênis</option>
            <option>Vôlei</option>
            <option>Fórmula 1</option>
            <option>Outros</option>
          </select>
        </label>
        <label>
          Resumo / descrição curta
          <input name="excerpt" required />
        </label>
        <label>
          Conteúdo completo
          <textarea name="content" rows="6" required></textarea>
        </label>
        <label>
          URL da imagem (opcional)
          <input name="image" placeholder="https://..." />
        </label>
        <div class="form-actions">
          <button type="submit" class="btn primary">Publicar</button>
          <button type="button" id="addCancel" class="btn ghost">Cancelar</button>
